# Build and publish the Kura Docker image to GitHub Container Registry
# (ghcr.io).
#
# Two publishing modes:
#   - direct push to `main`   → publishes ONLY the `edge` tag (development build)
#   - push of a `vX.Y.Z` tag  → publishes `X.Y.Z`, `X.Y`, `X` and `latest`
#
# `latest` is NOT computed with a "raw" tag conditioned on `is_default_branch`:
# that context is true when the push happens on the default branch (main),
# not when a `v*.*.*` tag is pushed — using it for `latest` would have made
# it show up on pushes to main (i.e. on untested `edge` builds) instead of on
# actual releases. Instead we rely on docker/metadata-action's native
# behavior: with `flavor: latest=auto` (the default), when the tag rules
# include `type=semver` and the trigger is a semver Git tag, the `latest` tag
# is automatically assigned to the highest published version. `type=edge`
# only activates on pushes to the given branch — the two cases are therefore
# mutually exclusive by construction, no manual raw tag needed.

name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

# Minimal permissions the job needs: read the repo (checkout) and write
# packages (push to ghcr.io). GITHUB_TOKEN with these permissions is
# enough, no PAT required.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU emulates non-native architectures on the runner (arm64),
      # needed to build the ARM image on a GitHub runner that is amd64.
      - name: Setup QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      # Buildx is the Docker builder with native support for multi-platform
      # builds and caching: it replaces the classic `docker build` builder.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GHCR with the Action's automatic token, valid only for the
      # duration of the workflow. github.actor is the user/bot that
      # triggered the run; no manual secret needs to be created.
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically compute Docker tags and OCI labels from the ref that
      # triggered the workflow (main branch → edge; vX.Y.Z tag → semver).
      # `images` also accepts owner/repo with uppercase letters:
      # metadata-action always normalizes to lowercase, required by ghcr.io.
      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=main
          labels: |
            org.opencontainers.image.title=Kura
            org.opencontainers.image.description=Self-hosted personal health record

      # Multi-arch build (amd64 + arm64, for Raspberry Pi/NAS) and direct
      # push to ghcr.io in the same step: with multiple platforms the
      # builder can't load locally (`--load`), so build and push are a
      # single operation. Cache on GitHub Actions to speed up later runs.
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
