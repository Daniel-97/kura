# Build e pubblicazione dell'immagine Docker di Kura su GitHub Container
# Registry (ghcr.io).
#
# Due modalità di pubblicazione:
#   - push diretto su `main`      → pubblica SOLO il tag `edge` (build di sviluppo)
#   - push di un tag `vX.Y.Z`     → pubblica `X.Y.Z`, `X.Y`, `X` e `latest`
#
# `latest` NON è calcolato con un tag "raw" condizionato su `is_default_branch`:
# quel context è vero quando il push avviene sul branch di default (main), non
# quando viene pushato un tag `v*.*.*` — usarlo per `latest` lo avrebbe fatto
# comparire sui push a main (cioè sulle build `edge`, non testate) invece che
# sulle release vere. Usiamo invece il comportamento nativo di
# docker/metadata-action: con `flavor: latest=auto` (default), quando le tag
# rules includono `type=semver` e il trigger è un tag Git semver, il tag
# `latest` viene assegnato automaticamente alla versione più alta pubblicata.
# `type=edge` invece si attiva solo sui push al branch indicato — i due casi
# sono quindi mutuamente esclusivi per costruzione, senza bisogno di raw tag
# manuali.

name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

# Permessi minimi necessari al job: leggere il repo (checkout) e scrivere
# pacchetti (push su ghcr.io). GITHUB_TOKEN con questi permessi è sufficiente,
# non serve un PAT.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      # QEMU emula le architetture non native del runner (arm64), necessario
      # per buildare l'immagine ARM su un runner GitHub che è amd64.
      - name: Setup QEMU (emulazione multi-arch)
        uses: docker/setup-qemu-action@v3

      # Buildx è il builder Docker con supporto nativo a multi-platform build
      # e cache: sostituisce il builder classico `docker build`.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login su GHCR con il token automatico dell'Action, valido solo per la
      # durata del workflow. github.actor è l'utente/bot che ha scatenato il
      # run; non serve creare un secret manuale.
      - name: Login su ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Calcola automaticamente tag Docker e label OCI a partire dal ref che
      # ha scatenato il workflow (branch main → edge; tag vX.Y.Z → semver).
      # `images` accetta anche owner/repo con maiuscole: metadata-action
      # normalizza sempre in lowercase, obbligatorio per ghcr.io.
      - name: Estrai metadati (tag e label)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=main
          labels: |
            org.opencontainers.image.title=Kura
            org.opencontainers.image.description=Libretto sanitario personale self-hosted

      # Build multi-arch (amd64 + arm64, per Raspberry Pi/NAS) e push diretto
      # su ghcr.io nello stesso step: con più piattaforme il builder non può
      # caricare in locale (`--load`), quindi build e push sono un'unica
      # operazione. Cache su GitHub Actions per velocizzare i run successivi.
      - name: Build e push immagine multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
