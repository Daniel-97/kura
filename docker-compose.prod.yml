services:
  kura:
    # Prebuilt image from ghcr.io: no local build needed.
    # Tag pinned to a specific version (NOT :latest) to avoid a
    # `docker compose pull && up -d` silently updating the app on top of
    # sensitive health data. Bump the version by hand after reading the
    # CHANGELOG for the new release, then rerun `docker compose pull kura
    # && docker compose up -d`.
    image: ghcr.io/daniel-97/kura:0.1.0
    # Run as the host user so files in ./pb_data stay writable outside Docker
    user: "${KURA_UID:-1000}:${KURA_GID:-1000}"
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
    restart: unless-stopped
    environment:
      # ALLOW_REGISTRATION here only disables the registration API endpoint:
      # the "Register" link in the UI stays visible because
      # VITE_ALLOW_REGISTRATION is baked into the bundle at image build time
      # on ghcr.io (default: enabled). To hide it you need to build the
      # image locally (see docker-compose.yml) with
      # ALLOW_REGISTRATION=false.
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      # Default superuser, created only if none exists yet
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kura.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      # Optional personal app user, created only if both are set
      USER_EMAIL: ${USER_EMAIL:-}
      USER_PASSWORD: ${USER_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Kura}
      APP_URL: ${APP_URL:-http://localhost:8090}
      # Native scheduled backups (in pb_data/backups/); "off" to disable
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_MAX_KEEP: ${BACKUP_MAX_KEEP:-7}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
