services:
  kura:
    build:
      context: .
      args:
        VITE_ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
    image: kura:latest
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
    restart: unless-stopped
    environment:
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
